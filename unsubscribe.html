<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unsubscribe | Solo Productivity</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 12px; border: 1px solid #222; text-align: center; max-width: 400px; width: 90%; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { background: #ff4444; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card" id="main-content">
        <h2>Unsubscribe</h2>
        <p>Enter your email to stop receiving weekly tips.</p>
        
        <form action="https://script.google.com/macros/s/AKfycbywC3QOCxHClYaazsepgULnW1zJo_0fXX5rS7Ms6iZkG6uTVi9gI-WabX3nywQQwi79/exec" method="GET" target="ghost_frame" onsubmit="showSuccess()">
            <input type="hidden" name="action" value="unsubscribe">
            <input type="email" name="email" id="email-field" placeholder="email@example.com" required>
            <button type="submit">Remove Me</button>
        </form>
    </div>

    <iframe name="ghost_frame" class="hidden"></iframe>

    <script>
        function showSuccess() {
            // A tiny half-second delay to guarantee the data fires before the screen changes
            setTimeout(() => {
                document.getElementById('main-content').innerHTML = `
                    <h2>You're off the list.</h2>
                    <p>It might take a second to update, but you're good. Stay focused.</p>
                    <br><br>
                    <a href="index.html" style="color:#00ff66; text-decoration:none;">Back to site</a>
                `;
            }, 500);
        }
    </script>
</body>
</html>
