<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
        name="description"
        content="Solo Productivity blog archive with all productivity insights and guides."
    />
    <title>Solo Productivity | All Insights</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap");

        :root {
            --bg: #000000;
            --bg-soft: #0a0a0a;
            --surface: #121212;
            --text: #f5f7f7;
            --muted: #a4adb0;
            --line: #1f1f1f;
            --accent: #7bff7b;
            --accent-soft: rgba(123, 255, 123, 0.16);
            --radius-lg: 20px;
            --radius-md: 14px;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            --container: 980px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Manrope", sans-serif;
            background:
                radial-gradient(circle at 12% 5%, rgba(123, 255, 123, 0.12), transparent 28%),
                radial-gradient(circle at 88% 95%, rgba(255, 255, 255, 0.08), transparent 26%),
                linear-gradient(180deg, #050505 0%, #000000 52%, #050505 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 34px 34px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: min(var(--container), calc(100% - 2.2rem));
            margin-inline: auto;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(10px);
        }

        .topbar-inner {
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .logo {
            text-decoration: none;
            color: var(--text);
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        .btn {
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 0.8rem 1.2rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-2px);
        }

        .btn-secondary {
            border-color: var(--line);
            color: #eef2f2;
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-secondary:hover,
        .btn-secondary:focus-visible {
            border-color: rgba(123, 255, 123, 0.45);
            color: var(--accent);
        }

        .hero {
            padding: 3.3rem 0 1.5rem;
        }

        .hero-shell {
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            border-radius: var(--radius-lg);
            padding: clamp(1.4rem, 3vw, 2.2rem);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: var(--accent-soft);
            color: #dbffdb;
            border: 1px solid rgba(123, 255, 123, 0.3);
            border-radius: 999px;
            padding: 0.35rem 0.85rem;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        h1 {
            margin-top: 1rem;
            font-size: clamp(1.7rem, 6vw, 3rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .lead {
            margin-top: 0.8rem;
            color: var(--muted);
            max-width: 70ch;
        }

        .archive {
            padding: 1.3rem 0 3rem;
        }

        .archive-list {
            display: grid;
            gap: 1rem;
        }

        .post-item {
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: var(--surface);
            padding: 1.2rem;
            transition: border-color 180ms ease, background-color 180ms ease;
        }

        .post-item:hover {
            border-color: rgba(123, 255, 123, 0.4);
            background: #171717;
        }

        .post-meta {
            color: #d9ffda;
            font-size: 0.76rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-block;
            border: 1px solid rgba(123, 255, 123, 0.25);
            background: rgba(123, 255, 123, 0.12);
            border-radius: 999px;
            padding: 0.25rem 0.6rem;
        }

        .post-title {
            margin-top: 0.75rem;
            font-size: clamp(1.08rem, 2.5vw, 1.26rem);
            line-height: 1.33;
        }

        .post-title a {
            color: var(--text);
            text-decoration: none;
        }

        .post-title a:hover,
        .post-title a:focus-visible {
            color: var(--accent);
        }

        .post-excerpt {
            margin-top: 0.55rem;
            color: var(--muted);
        }

        .empty-state {
            border: 1px dashed rgba(123, 255, 123, 0.4);
            border-radius: var(--radius-md);
            background: rgba(123, 255, 123, 0.06);
            padding: 1.3rem;
            color: #ddffe0;
        }

        .site-footer {
            border-top: 1px solid var(--line);
            padding: 1.1rem 0 2rem;
            color: #c7cdcf;
            font-size: 0.92rem;
        }

        @media (max-width: 640px) {
            .container {
                width: min(var(--container), calc(100% - 1.2rem));
            }

            .topbar-inner {
                min-height: 64px;
            }

            .hero {
                padding-top: 2.4rem;
            }

            .hero-shell {
                padding: 1rem;
            }

            .post-item {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <a class="logo" href="index.html">Solo <span>Productivity</span></a>
            <a class="btn btn-secondary" href="index.html" aria-label="Go back to homepage">Back to Home</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container hero-shell">
                <span class="eyebrow">Archive</span>
                <h1>All Productivity Insights</h1>
                <p class="lead">Browse every guide and article from Solo Productivity in one clean, scrollable timeline.</p>
            </div>
        </section>

        <section class="archive">
            <div class="container">
                <div class="archive-list" id="archiveList">
                    <article class="post-item">
                        <span class="post-meta">Loading</span>
                        <h2 class="post-title">Fetching latest insights...</h2>
                        <p class="post-excerpt">Your article archive will appear here automatically.</p>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Solo Productivity. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const archiveList = document.getElementById("archiveList");
        const yearEl = document.getElementById("year");

        yearEl.textContent = new Date().getFullYear();

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatDate(dateText) {
            const parsed = new Date(dateText);
            if (Number.isNaN(parsed.getTime())) {
                return "Recently";
            }

            return parsed.toLocaleDateString(undefined, {
                year: "numeric",
                month: "short",
                day: "numeric"
            });
        }

        function renderEmptyState() {
            archiveList.innerHTML = `
                <article class="empty-state">
                    <h2>Check back tomorrow for our first guide on subscription-free focus.</h2>
                    <p>As soon as posts are available in blog/posts.json, they will automatically appear here.</p>
                </article>
            `;
        }

        async function loadArchivePosts() {
            try {
                const response = await fetch("./blog/posts.json", { cache: "no-store" });
                if (!response.ok) {
                    throw new Error("Unable to load posts.json");
                }

                const posts = await response.json();
                if (!Array.isArray(posts) || posts.length === 0) {
                    throw new Error("No post data found");
                }

                const sortedPosts = posts
                    .slice()
                    .sort((a, b) => new Date(b.date) - new Date(a.date));

                archiveList.innerHTML = sortedPosts
                    .map((post) => {
                        const title = escapeHtml(post.title || "Untitled Article");
                        const excerpt = escapeHtml(post.excerpt || "Read the full article for more details.");
                        const url = escapeHtml(post.url || "#");
                        const date = formatDate(post.date);

                        return `
                            <article class="post-item">
                                <span class="post-meta">${date}</span>
                                <h2 class="post-title"><a href="${url}">${title}</a></h2>
                                <p class="post-excerpt">${excerpt}</p>
                            </article>
                        `;
                    })
                    .join("");
            } catch (error) {
                renderEmptyState();
            }
        }

        loadArchivePosts();
    </script>
</body>
</html>
